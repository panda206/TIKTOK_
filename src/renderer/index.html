<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';">
    <title>Renderer Control Panel</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <h2>Electron 控制面板</h2>

        <div class="control-group">
            <input 
                id="username" 
                type="text" 
                placeholder="输入主播用户名"
                autocomplete="off"
            >
            <button id="connectBtn">连接</button>
        </div>

        <div id="status" class="status-waiting">
            等待连接...
        </div>

        <!-- ==================== 💡 完美保留以上，以下为新增的大厅扫描控制区 ==================== -->
        <hr class="scan-divider">

        <div class="control-group scan-group">
            <button id="startScanBtn" class="btn-start-scan">开始扫描大厅</button>
            <button id="stopScanBtn" class="btn-stop-scan" disabled>停止</button>
        </div>

        <div id="scanStatus" class="scan-status-text">
            扫描状态：等待开始...
        </div>
        <div id="dataCountBox" class="scan-status-text scan-count-highlight">
            已成功获取数据：0 组
        </div>
        <!-- ================================================================================== -->
    </div>

    <script type="module" src="./renderer.js"></script>
</body>
</html>
